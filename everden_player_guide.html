<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Everden Player Guide</title>

<style>
:root{
  --bg:#111315;
  --bg2:#1a1d21;
  --card:#1b1f24;
  --border:#2a3038;
  --text:#f3f4f6;
  --muted:#a1a8b3;
  --accent:#7dd3fc;
  --accent2:#38bdf8;
  --shadow:0 10px 30px rgba(0,0,0,.25);
  --radius:18px;
  --gold:#f5c842;
  --gold2:#e0a800;
  --amber:#d97706;
}

*{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; }

body{
  background:linear-gradient(to bottom,#101214,#171a1f);
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;
  line-height:1.5;
  padding:0;
}

/* ── NAV ── */
.nav{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(17,19,21,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;
  gap:0;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav::-webkit-scrollbar{ display:none; }
.nav-btn{
  flex-shrink:0;
  background:none;
  border:none;
  color:var(--muted);
  font-size:.85rem;
  font-weight:600;
  letter-spacing:.04em;
  padding:14px 20px;
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:.15s;
  white-space:nowrap;
}
.nav-btn:hover{ color:var(--text); }
.nav-btn.active{ color:var(--accent2); border-bottom-color:var(--accent2); }

/* ── SECTIONS ── */
.section-wrap{
  display:none;
  max-width:1200px;
  margin:0 auto;
  padding:32px 20px 60px;
}
.section-wrap.active{ display:block; }

/* ── HERO ── */
.hero{
  text-align:center;
  padding:60px 20px 40px;
  border-bottom:1px solid var(--border);
  margin-bottom:36px;
}
.hero-eyebrow{
  font-size:.78rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--gold);
  font-weight:700;
  margin-bottom:14px;
}
.hero-title{
  font-size:clamp(2.4rem,7vw,4rem);
  font-weight:800;
  letter-spacing:-.03em;
  line-height:1.05;
  margin-bottom:16px;
}
.hero-sub{
  color:var(--muted);
  font-size:1rem;
  max-width:560px;
  margin:0 auto;
  line-height:1.7;
}

/* ── SHARED LABELS ── */
.section-label{
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:.78rem;
  color:var(--muted);
  margin-bottom:14px;
  margin-top:36px;
  font-weight:700;
}
.section-label:first-child{ margin-top:0; }

/* ══════════════════════════════
   SECTION 1: NATIONS
══════════════════════════════ */
.nation-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px;
}
.nation-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  box-shadow:var(--shadow);
}
.nation-card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.nation-name{
  font-size:1.2rem;
  font-weight:700;
  line-height:1.2;
}
.nation-subtitle{
  color:var(--muted);
  font-size:.88rem;
  margin-top:4px;
}
.nation-badge{
  flex-shrink:0;
  background:#1e2730;
  border:1px solid #32404d;
  color:var(--accent);
  padding:5px 11px;
  border-radius:999px;
  font-size:.75rem;
  font-weight:600;
  white-space:nowrap;
}
.nation-desc{
  color:#d5d8de;
  font-size:.93rem;
  line-height:1.7;
  margin-bottom:14px;
}
.nation-values{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-bottom:12px;
}
.tag{
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--muted);
  padding:4px 10px;
  border-radius:999px;
  font-size:.75rem;
}
.nation-leader{
  font-size:.82rem;
  color:var(--muted);
  border-top:1px solid var(--border);
  padding-top:10px;
}
.nation-leader span{
  color:var(--text);
}

.settlements {
  margin-top: 14px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.settlement {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
}
.settlement-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  gap: 10px;
}
.settlement-name {
  font-size: .92rem;
  font-weight: 600;
  color: var(--text);
}
.settlement-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.settlement-tag {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 3px 8px;
  border-radius: 999px;
  font-size: .7rem;
}
.settlement-tag.capital {
  border-color: #5a4a10;
  color: var(--gold);
  background: #1a1500;
}
.settlement-chevron {
  color: var(--muted);
  font-size: .8rem;
  flex-shrink: 0;
  transition: transform .2s;
}
.settlement.open .settlement-chevron { transform: rotate(180deg); }
.settlement-body {
  display: none;
  padding: 0 14px 12px;
  font-size: .88rem;
  color: #d5d8de;
  line-height: 1.65;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
.settlement.open .settlement-body { display: block; }

/* ══════════════════════════════
   SECTION 2: RACES
══════════════════════════════ */
.search-wrap{
  position:sticky;
  top:49px;
  z-index:50;
  margin-bottom:24px;
  backdrop-filter:blur(10px);
}
.search{
  width:100%;
  padding:14px 18px;
  border-radius:16px;
  border:1px solid var(--border);
  background:rgba(27,31,36,.92);
  color:var(--text);
  font-size:1rem;
  outline:none;
  box-shadow:var(--shadow);
}
.search:focus{ border-color:var(--accent2); }

.race-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:18px;
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  cursor:pointer;
  transition:.18s ease;
  box-shadow:var(--shadow);
}
.card:hover{ transform:translateY(-3px); border-color:#3b4450; }
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:12px;
}
.card-name{ font-size:1.25rem; font-weight:700; }
.card-animal{ color:var(--muted); font-size:.92rem; }
.speed{
  flex-shrink:0;
  background:#222933;
  color:var(--accent);
  border:1px solid #32404d;
  padding:6px 10px;
  border-radius:999px;
  font-size:.8rem;
  font-weight:600;
}
.pills{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.pill{
  background:var(--bg2);
  border:1px solid var(--border);
  color:var(--muted);
  padding:5px 10px;
  border-radius:999px;
  font-size:.75rem;
}
.preview{ display:flex; flex-direction:column; gap:10px; }
.preview-trait{
  border-top:1px solid var(--border);
  padding-top:10px;
  font-size:.92rem;
  color:#d8dbe0;
}
.preview-trait strong{ color:white; }
.more{ color:var(--muted); font-size:.8rem; }

.detail{ display:none; }
.detail.active{ display:block; }
.detail-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:28px;
  box-shadow:var(--shadow);
}
.detail-header{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:16px;
  margin-bottom:20px;
}
.detail-title{
  font-size:clamp(2rem,6vw,3rem);
  font-weight:800;
  line-height:1;
}
.detail-sub{ color:var(--muted); margin-top:8px; }
.back{
  background:none;
  border:none;
  color:var(--accent);
  font-size:1rem;
  margin-bottom:18px;
  cursor:pointer;
}
.lore{
  background:var(--bg2);
  border:1px solid var(--border);
  padding:18px;
  border-radius:18px;
  color:#d5d8de;
  margin-bottom:24px;
  line-height:1.7;
}
.traits{ display:flex; flex-direction:column; gap:14px; }
.full-trait{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  line-height:1.65;
  color:#d9dce2;
}
.full-trait strong{ color:white; }
.origin{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  color:#d9dce2;
}
.empty{ text-align:center; padding:60px 20px; color:var(--muted); }

/* ══════════════════════════════
   SECTION 3: PANTHEON
══════════════════════════════ */
.god-grid{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.god-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:0;
  overflow:hidden;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:.15s;
}
.god-card:hover{ border-color:#3b4450; }
.god-card-header{
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px 20px;
}
.god-icon{
  width:40px;
  height:40px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.3rem;
  flex-shrink:0;
}
.god-names{ flex:1; min-width:0; }
.god-name{ font-size:1.05rem; font-weight:700; }
.god-epithet{ color:var(--muted); font-size:.83rem; font-style:italic; margin-top:2px; }
.god-chevron{
  color:var(--muted);
  font-size:.9rem;
  transition:transform .2s;
  flex-shrink:0;
}
.god-card.open .god-chevron{ transform:rotate(180deg); }
.god-body{
  display:none;
  padding:0 20px 20px;
  border-top:1px solid var(--border);
}
.god-card.open .god-body{ display:block; }
.god-body p{
  font-size:.93rem;
  line-height:1.72;
  color:#d5d8de;
  margin-top:16px;
}
.god-body p em{
  color:var(--muted);
  font-style:italic;
}
.god-body .worshipers{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin-top:14px;
}

/* ══════════════════════════════
   SECTION 4: LANGUAGES
══════════════════════════════ */
.lang-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;
}
.lang-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
}
.lang-card.restricted{
  border-color:#3d2a10;
  background:#1a1610;
}
.lang-name{ font-size:1.15rem; font-weight:700; margin-bottom:4px; }
.lang-script{
  font-size:.78rem;
  color:var(--muted);
  margin-bottom:12px;
  text-transform:uppercase;
  letter-spacing:.06em;
}
.lang-desc{
  font-size:.92rem;
  color:#d5d8de;
  line-height:1.68;
}
.lang-restrict{
  margin-top:12px;
  background:#2d1a06;
  border:1px solid #5a3a10;
  border-radius:10px;
  padding:10px 12px;
  font-size:.8rem;
  color:#f5c842;
}

/* ══════════════════════════════
   SECTION 5: CHARACTERS
══════════════════════════════ */
.char-location{
  flex-shrink:0;
  background:#1e2730;
  border:1px solid #32404d;
  color:var(--accent);
  padding:4px 10px;
  border-radius:999px;
  font-size:.72rem;
  font-weight:600;
  white-space:nowrap;
}
.patron-type{
  flex-shrink:0;
  background:#241a2e;
  border:1px solid #3e3050;
  color:#c4a5f2;
  padding:4px 10px;
  border-radius:999px;
  font-size:.72rem;
  font-weight:600;
  white-space:nowrap;
}

/* ── RESPONSIVE ── */
@media (max-width:700px){
  body{ padding:0; }
  .section-wrap{ padding:20px 14px 50px; }
  .race-grid, .nation-grid, .lang-grid{ grid-template-columns:1fr; gap:14px; }
  .card{ padding:18px; }
  .detail-card{ padding:20px; border-radius:20px; }
  .detail-title{ font-size:2rem; }
  .search{ font-size:16px; padding:14px 16px; }
  .card-top{ flex-direction:column; align-items:flex-start; }
  .speed{ align-self:flex-start; }
  .nav-btn{ padding:12px 14px; font-size:.78rem; }
  .hero{ padding:36px 16px 28px; }
}
</style>

      "leaderLabel": "Leaders: ",

        {

  "nationNotes": [
    {
      "label": "A Note on the Silent",
      "text": "Not every animal woke up. While you stand upright and wear clothes, many of your cousins remained the Silent: non-sentient beasts of the wild. Hunting Silent animals for food is a reality of life in Everden, but it is a grim one. Most folk would never eat a Silent animal of a similar species to their own, and the line between Awakened and Silent is a subject of genuine philosophical anxiety in every nation."
    },
    {
      "label": "Other Nations of Everden",
      "text": "You may wish to create a character that does not fit neatly into the listed playable races or list of nations, but Everden is an expansive world, and there are plenty of nations and animalfolk outside of what I've listed. I encourage you to work with me to make your idea a reality!"
    },
    {
      "label": "Magic in Everden",
      "text": "Magic exists in Everden, though it is not so common that anyone takes it for granted. Mage colleges operate in Goldcollar, Sunreach, and Whiskerburrow. Sorcerers with magic bloodlines appear most often in noble families, though they are not unheard of among commoners. Artificers sell enchanted goods in Petsburg and a handful of other major cities, but many of the most interesting magic items in the world were pulled out of Smooth One ruins by people who were probably not supposed to be there. Anyone with magical ability or skill in alchemy will never struggle to find work, whether in a royal court or running their own business. Player characters, naturally, tend to find adventure more compelling than either."
    },
    {
      "label": "Monsters and Dangers",
      "text": "Everden is not a safe world. The Silent are not the only threat in the wilderness: creatures that would be at home in any dungeon lurk in the ruins of the Smooth Ones, in deep caves, in old forests, and in places that have not seen light in a very long time. Most populated areas are reasonably secure, but the ruins are another matter entirely. Dragons exist. They are rare, largely confined to the deep wilderness and the interior of Sunreach, and the subject of significant academic disagreement about their origins. Whether they predate the Smooth Ones or are somehow their legacy is a question nobody has managed to ask one directly and survive to report on."
    }
  ],

    "patrons": {
      "label": "Warlock Patrons",
      "intro": "Not every power in Everden asks for worship. Some prefer a signature. The beings below are not gods, knowledge of them is more limited, and no temples are built to honor them, but each has been known to lend power to mortals willing to strike a bargain. If you are building a warlock, these are the patrons most often whispered about, though stranger arrangements are always possible.",
      "list": [
        {
          "type": "Archfey",
          "iconBg": "#0e2213",
          "icon": "🦌",
          "name": "The Antlered King",
          "epithet": "Lord of the Silent Court",
          "original": "Oberon",
          "paragraphs": [
            "Somewhere beyond the oldest forests, in a secluded land where no Awakened folk dare tread, an immense stag holds court on a throne of living roots. The Antlered King is said to be older than the Awakening, older perhaps than the Smooth Ones, and his subjects are the Silent. Every beast that never woke is, by his logic, a citizen of his twilight kingdom. He regards the Awakened as an amusing curiousitty, as if his subjects wandered off and declared themselves foreign nations. Some who serve him say the Great Awakening was simply a door he left open. He has never confirmed or denied this, but he enjoys the rumors tremendously.",
            "His bargains are binding, and paid in strange ways: a favorite memory, a letter from your name, the color of your eyes, or the promise of a dance at a festival that has not happened yet. He isn't cruel, but his priorities aren't mortal ones, and those seeking a deal with him should be very careful with their words."
          ],
          "seekers": ["Moonhowl shamans", "Deep forest dwellers", "Those in tune with the Silent"]
        },
        {
          "type": "Devil",
          "iconBg": "#220d0d",
          "icon": "✒️",
          "name": "The Hellhound",
          "epithet": "The Gentleman of the Fine Print",
          "original": "Asmodeus",
          "paragraphs": [
            "Whereas the Golden Collars blesses honest deals, the Hellhound loves the kind that seem honest until you read the fine print. He appears as an immaculately dressed flaming dogfolk man with red wings and a spade-tipped tail, and a fearsome toothy grin with more teeth than seem necessary. He will be the first to tell you that his contracts are exceptionally fair, and that he's never once broken the letter of an agreement. However, ask anyone who's made a deal with him, and they may tell you a very different story.",
            "The Hellhound loves the kinds of deals made by people who think they have nothing to lose, as they often don't know what they have until it's gone. His warlocks receive exactly what they asked for, delivered promptly and in full. The rub, of course, is knowing what you're trading away."
          ],
          "seekers": ["The desperate", "The ambitious poor", "The greedy", "Debtors out of options"]
        },
        {
          "type": "Celestial",
          "iconBg": "#231d08",
          "icon": "🦄",
          "name": "The Rainbowed Horn",
          "epithet": "The Source of all Rainbows",
          "original": "Unicorn",
          "paragraphs": [
            "In their dreams, some mortals meet a fantastical horse of impossible sparkling colors. Some describe her with a horn, some with wings, and others describe her as having both, but all describe her as being kind, gentle, and having an overflowing heart. The Rainbowed Horn is said to have loved the Smooth Ones, and to have watched them go, and to have decided that whatever walks upright next would not go unguarded. Those familiar with her believe she still walks the mortal world, somewhere deep within the forests of Everden, the last of her kind.",
            "She asks little of her warlocks: mend what you can, light what you must, and be kind to the Silent, for they are somebody's cousins. Its power arrives as warmth in the chest and light in the palms, and those who carry it say the grief comes with it, just a little, like heat off a hearth."
          ],
          "seekers": ["Healers", "Guardians of the small", "Pilgrims who dreamed at dawn", "Protectors of the Silent"]
        },
        {
          "type": "Great Old One",
          "iconBg": "#101018",
          "icon": "🌀",
          "name": "The Unceasing Choir",
          "epithet": "The Swirling Minds of Madness",
          "original": "Tharizdun",
          "paragraphs": [
            "Deep within Everden, in a cave nobody has ever found, is a terrifying eye, full of swirling, intermingling wisps. The wisps sing in a discordant aria that would drive you mad if you listened for too long, sung by not one voice, but all of them. Countless unresting voices of innumerable beings, neither dead nor alive, swirl around the eye like leaves in a whirlpool and scream in a chorus of conflicting wants. Build it. Take it apart. Come home. Never come back. Remember us. Forget. Blow up a post office. Open an orphanage. Each voice wants different things, but the whole of it drifts, slowly and unmistakably, toward some unknowable purpose that no mortal mind has been able to understand, not evil, but absolutley alien.",
            "The choir's warlocks do not make bargains so much as get noticed. They hear fragments of the voice, understand a word of Smoothtalk they were never taught, or find books that follow them unceasingly. The expereince always leaves them changed."
          ],
          "seekers": ["Ruin-delvers", "Smoothtalk scholars", "The Awakening-obsessed", "Those who hear it humming"]
        }
      ]
    },
    "otherPowersText": "The gods listed here are the most widely known across Everden, but they are not the only powers worthy of worship (or making a deal for power with). Local spirits, ancient beings, forgotten names, and stranger things exist at the edges of the known world. If none of the listed gods feel right for your character, talk to me and we can work something out together."
  },
  "languages": {
    "intro": "Everden has it's own set of languages. Use these instead of the PHB language list during character creation. <b>Your character knows Collartongue and ONE other language from this list.</b> Your class and other features may give you additional languages, such as Druidic or Thieves' Cant.",

        "name": "Collartongue",
        "script": "Script: Repurposed Smooth One lettering - Common to all",
        "desc": "The common trade tongue of Goldcollar and most of the civilized world. It evolved from several older languages over centuries of commerce. Every character speaks this by default. If someone in Everden speaks one language, it is this one.",

        "extraClass": "",
        "style": "",
        "name": "Whispersqueak",
        "script": "Script: Flowing cursive",
        "desc": "The native tongue of Carrovia and Whiskerburrow, spoken by rabbits, mice, and most small prey-folk. Used by academics, poets, and keepers of Great Awakening lore. It carries more vocabulary for concepts of memory, loss, and community than any other language in Everden.",
        "restrict": null
      },
      {
        "extraClass": "",
        "style": "",
        "name": "Ironmouth",
        "script": "Script: Runic",
        "desc": "The language of boars, horses, and the industrial folk of Iron-Tusk. Clipped, efficient, and loud. Foreigners often describe it as sounding permanently impatient. Its runic script was designed to be carved into metal, and most Ironmouth signage still is.",

      },
      {
        "extraClass": "",
        "style": "",
        "name": "Scalese",
        "script": "Script: Pictographic",
        "desc": "Spoken by lizards, toads, and the ancient peoples of Sunreach. One of the oldest living languages in Everden, with roots that may predate the Awakening itself. Its pictographic script is found on ruin walls throughout the jungle, some of it predating anything scholars can reliably date.",

      },
      {
        "extraClass": "",
        "style": "",
        "name": "Howltongue",
        "script": "Script: None (oral tradition only)",

      },
      {

        "style": "",
        "name": "Plumesong",
        "script": "Script: Musical Notation",
        "desc": "Spoken by birds of all kinds. Contains sounds that no non-avian throat can fully reproduce, meaning most non-speakers learn only a rough approximation. Native speakers can always tell when they are being spoken to by an outsider, and they find it charming in the way that is almost condescending.",

  "characters": {
    "enabled": true,
    "label": "Characters of Everden",
    "intro": "The folk below are some of the most talked-about figures in Everden. Click on a character to learn more. A card can be a single person or a whole group, and this list will grow as the campaign does.",
    "list": [
      {
        "name": "Queen Daisy & King Wrinkles",
        "title": "The Dual Monarchs of Goldcollar",
        "location": "Petsburg, Goldcollar",
        "iconBg": "#221a05",
        "icon": "👑",
        "paragraphs": [
          "Goldcollar's throne seats two, and the arrangement works better than anyone expected. Queen Daisy, of an old Golden Retriever lineage, is beloved for a warmth that appears entirely genuine and a memory for names that appears entirely supernatural. King Wrinkles, a Sphinx Cat of considerable age and no fur whatsoever, is renowned for a shrewdness so cold that merchants have been known to lower their own prices mid-sentence under his gaze.",
          "Between them they balance Goldcollar's twin appetites for generosity and profit. Court gossip holds that no proposal survives dinner with both of them unchanged: Daisy finds what is kind in it, Wrinkles finds what is profitable, and what emerges is usually both."
        ]
      },
      {
        "name": "Count Barnaby von Hop",
        "title": "Count of Carrovia",
        "location": "Hopswall, Carrovia",
        "iconBg": "#141020",
        "icon": "🐇",
        "paragraphs": [
          "There was a time when the Count of Carrovia was the most visible noble in Everden: the autumn festivals of Hopswall were his personal pride, and his swift knights rode escort for any traveler who asked. That time has passed. The festivals are quietly cancelled, the castle gates close before dark, and appointments with the Count are not being granted, to ambassadors, to old friends, to anyone.",
          "What is known is only this: the mist at Carrovia's borders arrived during his rule, he has never once addressed it publicly, and the few staff who have left his service decline to discuss their former employer in a way that suggests generous severance, genuine fear, or both."
        ]
      },
      {
        "name": "The Forge Council",
        "title": "Governing Body of Iron-Tusk",
        "location": "Greygorge, Iron-Tusk",
        "iconBg": "#1f1010",
        "icon": "⚒️",
        "paragraphs": [
          "Iron-Tusk is not ruled so much as operated. The Forge Council is a body of boar and horse guildmasters, each representing one of the nation's great industries, meeting in the Iron Hall beneath banners that nobody has bothered to decorate. They are headed by the Grand Tusk, an office held by whichever councilor the others distrust least, which its current holder has described as the only honest election in Everden.",
          "The Council is blunt, slow to spend, and ruthlessly practical, which makes its recent behavior all the more interesting: three tunnels at Sootpass sealed by official order, an artificers' report delivered directly to the Grand Tusk, and a line item in the public budget labeled only \"containment\" that no councilor will explain."
        ]
      },
      {
        "name": "The Sun Council",
        "title": "Ritual Keepers of Sunreach",
        "location": "Solanthis, Sunreach",
        "iconBg": "#221800",
        "icon": "☀️",
        "paragraphs": [
          "The Sun Council does not campaign, legislate, or explain. Its members, ancient ritual keepers drawn from the lizardfolk and toadfolk lineages of Sunreach, meet at the highest point of the Solanthis temple complex at noon, every day, without exception. The rituals they keep predate written history, and when asked what would happen if a session were missed, council members give the same answer they give to most questions, which is nothing.",
          "Outsiders find the Council maddening; Sunreach finds it comforting. Whatever the keepers are doing up there every noon, the nation has outlasted empires while doing it, and in Sunreach that is considered a complete argument."
        ]
      }
    ]
  }

{n:"Enduring March",d:"You require only 4 hours of sleep to gain the benefits of a Long Rest (you spend the other hours in light activity). You have advantage on Constitution saving throws against Exhaustion from forced marching or strenuous travel."}
],feat:"Charger or Athlete",lore:"Equine-folk are the great travellers and traders of the animalfolk lands, their roads and caravans stitching distant communities together. They are proud of their freedom above all else, and an equine pressed into servitude is a dangerous creature. They're known for an easy sociability and an instinct for reading people that makes them natural diplomats and merchants. Whatever you do, never ask to ride upon their backs."},
{id:9,name:"Cervine",animal:"Deer / boar",size:"Medium",speed:30,traits:[
{n:"Bounding Charge",d:"Opportunity attacks against you are made with disadvantage"},
{n:"Powerful Build",d:"You count as one size larger when determining carrying capacity and the weight you can push, drag, or lift."},
{n:"Fleet of Hoof",d:"Difficult terrain costs you no extra movement when you Dash."},
{n:"Stag's Presence (Deer) OR Boar's Fury (Boar)",d:"Deer: You can cast Calm Emotions without a spell slot (Wisdom, Intelligence, or Charisma is your spellcasting ability). Once you use this feature, you can't use it again until completing a long rest. Boar: When you are reduced to half your maximum Hit Points or lower, you have advantage on melee attack rolls."},
{n:"Keen Smell",d:"You have advantage on Perception checks that rely on smell."}
],feat:"Charger or Sentinel",lore:"Cervines command respect in most communities simply by walking into a room. Deer-folk are graceful diplomats and keepers of ancient forest law; boar-folk are stubborn, courageous, and notoriously hard to stop once they have decided on a course of action."},
{id:10,name:"Canine",animal:"Dog",size:"Medium",speed:30,traits:[
{n:"Loyal Bond",d:"Choose one creature as your Bonded Companion at the end of each Long Rest. While within 30 feet of your Bonded Companion, they have advantage on saving throws against being Frightened. If your companion drops to 0 Hit Points, you can use your Reaction to move up to your Speed toward them without provoking Opportunity Attacks."},
{n:"Tracker's Nose",d:"You have advantage on Wisdom (Perception) and Wisdom (Survival) checks that rely on smell. You can follow a scent trail up to 24 hours old, even through rain or other adverse conditions."},
{n:"Protective Instinct",d:"When an ally within 5 feet of you is hit by an attack, you can impose disadvantage on the attack roll as a Reaction. You can use this trait a number of times equal to your Proficiency Bonus after each long rest."},
{n:"Brave",d:"You have advantage on saving throws against being Frightened."},
{n:"Pack Coordination",d:"Once per turn when you hit a creature that another ally hit within the last 6 seconds, you deal an additional 1d4 damage of the same type."}
],feat:"Inspiring Leader or Shield Master",lore:"Canine-folk are the great loyalists of Everden, building communities of fierce devotion and mutual protection. They are found in every role from town guard to wandering merchant, and their reputation for keeping their word has made them prized partners in any enterprise. A canine's friendship is not easily won, but once given, it is lifelong."},
{id:11,name:"Feline",animal:"Cat",size:"Small or Medium",speed:35,traits:[
{n:"Always Land",d:"You never take falling damage from falls of 30 feet or less, and you land on your feet. For greater falls, reduce the damage as if the fall were 30 feet shorter."},
{n:"Retractable Claws",d:"Your claws are natural weapons. You can make one Claw attack as an action or bonus action (1d4 + Strength or Dexterity modifier slashing). You can retract them at will; when retracted, your footsteps make no sound when barefoot."},
{n:"Nine Lives",d:"When you are reduced to 0 Hit Points but not killed outright, you can set your Hit Points to 9 instead. You can't use this trait again until you finish a Long Rest. You may only use this trait 9 times total, ever."},
{n:"Darkvision",d:"You have Darkvision with a range of 60 feet."},
{n:"Uncanny Curiosity",d:"You have proficiency in the Investigation skill. You have advantage on Intelligence (Investigation) checks to examine objects, mechanisms, or documents you can physically handle."}
],feat:"Skulker or Alert",lore:"Feline-folk are infuriatingly self-possessed. Serene in crisis, curious at the worst moments, and possessed of an independence that their allies sometimes call unhelpful. Domestic cat-folk are urban sophisticates who move through cities like shadows; wilder cat-folk such as lynx or bobcat lineages tend toward solitary ranger lives deep in unclaimed territory."}
];
</script>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showSection('nations',this)">Nations</button>
  <button class="nav-btn" onclick="showSection('races',this)">Races</button>
  <button class="nav-btn" id="nav-characters" onclick="showSection('characters',this)">Characters</button>
  <button class="nav-btn" onclick="showSection('pantheon',this)">Panthereon</button>
  <button class="nav-btn" onclick="showSection('languages',this)">Languages</button>
</nav>

<!-- ══════════════════════════════
     SECTION: NATIONS
══════════════════════════════ -->
<div id="sec-nations" class="section-wrap active">
  <div class="hero">
    <div class="hero-eyebrow" id="hero-eyebrow"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-sub" id="hero-sub"></p>
  </div>

  <div class="section-label" id="nations-grid-label"></div>
  <div class="nation-grid" id="nation-grid"></div>

  <div id="nation-notes"></div>
</div>

<!-- ══════════════════════════════
     SECTION: RACES
══════════════════════════════ -->
<div id="sec-races" class="section-wrap">
  <div class="search-wrap">
    <input class="search" id="search" placeholder="Search races..." onkeyup="renderRaces()" />
  </div>
  <div class="race-grid" id="race-grid"></div>
  <div class="detail" id="race-detail"></div>
</div>

<!-- ══════════════════════════════
     SECTION: CHARACTERS
══════════════════════════════ -->
<div id="sec-characters" class="section-wrap">
  <div class="section-label" style="margin-top:0;" id="characters-label"></div>
  <p style="color:var(--muted);font-size:.93rem;margin-bottom:24px;line-height:1.7;" id="characters-intro"></p>
  <div class="god-grid" id="char-grid"></div>
</div>

<!-- ══════════════════════════════
     SECTION: PANTHEON
══════════════════════════════ -->
<div id="sec-pantheon" class="section-wrap">
  <p id="pantheon-intro"></p>
  <div id="pantheon-mount"></div>
</div>

<!-- ══════════════════════════════
     SECTION: LANGUAGES
══════════════════════════════ -->
<div id="sec-languages" class="section-wrap">
  <div class="section-label" style="margin-top:0;" id="languages-label"></div>
  <p style="color:var(--muted);font-size:.93rem;margin-bottom:24px;line-height:1.7;" id="languages-intro"></p>
  <div class="lang-grid" id="lang-grid"></div>
</div>

</body>

<script>
/* ── NAV ── */
function showSection(id, btn){
  document.querySelectorAll('.section-wrap').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── HERO ── */
function renderHero(){
  document.getElementById('hero-eyebrow').textContent = CONTENT.hero.eyebrow;
  document.getElementById('hero-title').textContent = CONTENT.hero.title;
  document.getElementById('hero-sub').innerHTML = CONTENT.hero.sub;
}

/* ── NATIONS ── */
function renderNations(){
  document.getElementById('nations-grid-label').textContent = CONTENT.nationsGridLabel;

  document.getElementById('nation-grid').innerHTML = CONTENT.nations.map(n => `
    <div class="nation-card">
      <div class="nation-card-top">
        <div>
          <div class="nation-name">${n.name}</div>
          <div class="nation-subtitle">${n.subtitle}</div>
        </div>
        <div class="nation-badge">${n.badge}</div>
      </div>
      <p class="nation-desc">${n.desc[0]}</p>
      <div class="nation-values">
        ${n.values.map(v=>`<span class="tag">${v}</span>`).join('')}
      </div>
      <p class="nation-desc" style="margin:12px 0 0;">${n.desc[1]}</p>
      <div class="settlements">
        ${n.settlements.map(s=>`
        <div class="settlement" onclick="this.classList.toggle('open')">
          <div class="settlement-header">
            <span class="settlement-name">${s.name}</span>
            <div class="settlement-tags">${s.tags.map(t=>`<span class="settlement-tag${t.capital?' capital':''}">${t.text}</span>`).join('')}</div>
            <span class="settlement-chevron">▾</span>
          </div>
          <div class="settlement-body">${s.body}</div>
        </div>`).join('')}
      </div>
      <div class="nation-leader" style="margin-top:14px;">${n.leaderLabel}<span>${n.leaderText}</span></div>
    </div>
  `).join('');

  document.getElementById('nation-notes').innerHTML = CONTENT.nationNotes.map(note => `
    <div class="section-label" style="margin-top:44px;">${note.label}</div>
    <div class="nation-card" style="max-width:640px;">
      <p class="nation-desc" style="margin:0;">${note.text}</p>
    </div>
  `).join('');
}

/* ── PANTHEON ── */
function renderPantheon(){
  document.getElementById('pantheon-intro').textContent = CONTENT.pantheon.intro;

  document.getElementById('pantheon-mount').innerHTML = CONTENT.pantheon.groups.map((group, gi) => `
    <div class="section-label"${gi===0 ? ' style="margin-top:10;"' : ''}>${group.title}</div>
    <div class="god-grid">
      ${group.gods.map(god => `
      <div class="god-card" onclick="this.classList.toggle('open')">
        <div class="god-card-header">
          <div class="god-icon" style="background:${god.iconBg};">${god.icon}</div>
          <div class="god-names">
            <div class="god-name">${god.name}</div>
            <div class="god-epithet">${god.epithet}</div>
            <!-- ${god.original} -->
          </div>
          <span class="god-chevron">▾</span>
        </div>
        <div class="god-body">
          ${god.paragraphs.map(p=>`<p>${p}</p>`).join('')}
          <div class="worshipers">${god.worshipers.map(w=>`<span class="tag">${w}</span>`).join('')}</div>
        </div>
      </div>`).join('')}
    </div>
  `).join('') + `
    <div class="section-label" style="margin-top:44px;">${CONTENT.pantheon.patrons.label}</div>
    <p style="color:var(--muted);font-size:.93rem;margin-bottom:14px;line-height:1.7;">${CONTENT.pantheon.patrons.intro}</p>
    <div class="god-grid">
      ${CONTENT.pantheon.patrons.list.map(p => `
      <div class="god-card" onclick="this.classList.toggle('open')">
        <div class="god-card-header">
          <div class="god-icon" style="background:${p.iconBg};">${p.icon}</div>
          <div class="god-names">
            <div class="god-name">${p.name}</div>
            <div class="god-epithet">${p.epithet}</div>
            <!-- ${p.original} -->
          </div>
          <span class="patron-type">${p.type}</span>
          <span class="god-chevron">▾</span>
        </div>
        <div class="god-body">
          ${p.paragraphs.map(par=>`<p>${par}</p>`).join('')}
          <div class="worshipers">${p.seekers.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
        </div>
      </div>`).join('')}
    </div>
    <div class="section-label" style="margin-top:44px;">Other Powers</div>
    <div class="nation-card" style="max-width:640px;">
      <p class="nation-desc" style="margin:0;">${CONTENT.pantheon.otherPowersText}</p>
    </div>
  `;
}

/* ── CHARACTERS ── */
function renderCharacters(){
  // To hide the Characters tab, set "enabled": false on "characters" in CONTENT above.
  if(!CONTENT.characters.enabled){
    document.getElementById('nav-characters').style.display='none';
    return;
  }
  document.getElementById('characters-label').textContent = CONTENT.characters.label;
  document.getElementById('characters-intro').innerHTML = CONTENT.characters.intro;

  document.getElementById('char-grid').innerHTML = CONTENT.characters.list.map(c => `
    <div class="god-card" onclick="this.classList.toggle('open')">
      <div class="god-card-header">
        <div class="god-icon" style="background:${c.iconBg};">${c.icon}</div>
        <div class="god-names">
          <div class="god-name">${c.name}</div>
          <div class="god-epithet">${c.title}</div>
        </div>
        <span class="char-location">${c.location}</span>
        <span class="god-chevron">▾</span>
      </div>
      <div class="god-body">
        ${c.paragraphs.map(p=>`<p>${p}</p>`).join('')}
      </div>
    </div>
  `).join('');
}

/* ── LANGUAGES ── */
function renderLanguages(){
  document.getElementById('languages-label').textContent = CONTENT.languagesLabel;
  document.getElementById('languages-intro').innerHTML = CONTENT.languages.intro;

  document.getElementById('lang-grid').innerHTML = CONTENT.languages.list.map(l => `
    <div class="lang-card${l.extraClass ? ' '+l.extraClass : ''}"${l.style ? ` style="${l.style}"` : ''}>
      <div class="lang-name">${l.name}</div>
      <div class="lang-script">${l.script}</div>
      <p class="lang-desc">${l.desc}</p>
      ${l.restrict ? `<div class="lang-restrict">${l.restrict}</div>` : ''}
    </div>
  `).join('');
}

/* ── RACES ── */
function showGrid(){
  document.getElementById('race-grid').style.display='grid';
  const d=document.getElementById('race-detail');
  d.classList.remove('active');
  d.innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}

function showDetail(id){
  const r=races.find(x=>x.id===id);
  document.getElementById('race-grid').style.display='none';
  const detail=document.getElementById('race-detail');
  detail.classList.add('active');
  detail.innerHTML=`
    <button class="back" onclick="showGrid()">← Back to all races</button>
    <div class="detail-card">
      <div class="detail-header">
        <div>
          <div class="detail-title">${r.name}</div>
          <div class="detail-sub">${r.animal} · ${r.size} · ${r.speed} ft speed</div>
        </div>
        <div class="pills"><div class="pill">${r.traits.length} Traits</div></div>
      </div>
      <div class="lore">${r.lore}</div>
      <div class="section">
        <div class="section-label">Species Traits</div>
        <div class="traits">
          ${r.traits.map(t=>`<div class="full-trait"><strong>${t.n}.</strong> ${t.d}</div>`).join('')}
        </div>
      </div>
      <div class="section">
        <div class="section-label">Base Information</div>
        <div class="origin">Creature Type: Humanoid<br>Move Speed: ${r.speed} ft</div>
      </div>
    </div>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderRaces(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=races.filter(r=>!q||r.name.toLowerCase().includes(q)||r.animal.toLowerCase().includes(q));
  const grid=document.getElementById('race-grid');
  if(!filtered.length){ grid.innerHTML='<div class="empty">No races found.</div>'; return; }
  grid.innerHTML=filtered.map(r=>`
    <div class="card" onclick="showDetail(${r.id})">
      <div class="card-top">
        <div><div class="card-name">${r.name}</div><div class="card-animal">${r.animal}</div></div>
        <div class="speed">${r.speed} ft</div>
      </div>
      <div class="pills"><div class="pill">${r.size}</div><div class="pill">${r.traits.length} traits</div></div>
      <div class="preview">
        ${r.traits.slice(0,2).map(t=>`<div class="preview-trait"><strong>${t.n}.</strong> ${t.d.substring(0,90)}${t.d.length>90?'…':''}</div>`).join('')}
        <div class="more">+ ${r.traits.length-2} more traits</div>
      </div>
    </div>
  `).join('');
}

renderHero();
renderNations();
renderCharacters();
renderPantheon();
renderLanguages();
renderRaces();
</script>
</html>
