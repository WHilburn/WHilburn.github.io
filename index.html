<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Everden Player Guide</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" id="nav-nations" onclick="showSection('nations',this)">Nations</button>
  <button class="nav-btn" id="nav-races" onclick="showSection('races',this)">Races</button>
  <button class="nav-btn" id="nav-characters" onclick="showSection('characters',this)">Characters</button>
  <button class="nav-btn" id="nav-pantheon" onclick="showSection('pantheon',this)">Panthereon</button>
  <button class="nav-btn" id="nav-languages" onclick="showSection('languages',this)">Languages</button>
  <button class="nav-btn" id="nav-lore" onclick="showSection('lore',this)">Lore</button>
</nav>

<!-- ══════════════════════════════
     SECTION: NATIONS
══════════════════════════════ -->
<div id="sec-nations" class="section-wrap active">
  <div class="hero">
    <div class="hero-eyebrow" id="hero-eyebrow"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-sub" id="hero-sub"></p>
  </div>

  <div class="map-wrap">
    <img src="Everden%20Map.jpg" alt="Map of Everden" class="map-thumb" onclick="openMapLightbox()" />
  </div>

  <div class="section-label" id="nations-grid-label"></div>
  <div class="nation-grid" id="nation-grid"></div>

  <div id="nation-notes"></div>
</div>

<div class="map-lightbox" id="map-lightbox" onclick="closeMapLightbox()">
  <button class="map-lightbox-close" onclick="closeMapLightbox()" aria-label="Close map">✕</button>
  <img src="Everden%20Map.jpg" alt="Map of Everden (full size)" onclick="event.stopPropagation()" />
</div>

<!-- ══════════════════════════════
     SECTION: RACES
══════════════════════════════ -->
<div id="sec-races" class="section-wrap">
  <div class="search-wrap">
    <input class="search" id="search" placeholder="Search races..." onkeyup="renderRaces()" />
  </div>
  <div class="race-grid" id="race-grid"></div>
  <div class="detail" id="race-detail"></div>

  <div id="other-races-section">
    <div class="section-label" style="margin-top:44px;" id="other-races-label"></div>
    <p style="color:var(--muted);font-size:.93rem;margin-bottom:24px;line-height:1.7;" id="other-races-intro"></p>
    <div class="god-grid" id="other-races-grid"></div>
  </div>
</div>

<!-- ══════════════════════════════
     SECTION: CHARACTERS
══════════════════════════════ -->
<div id="sec-characters" class="section-wrap">
  <div class="section-label" style="margin-top:0;" id="characters-label"></div>
  <p style="color:var(--muted);font-size:.93rem;margin-bottom:24px;line-height:1.7;" id="characters-intro"></p>
  <div class="god-grid" id="char-grid"></div>
</div>

<!-- ══════════════════════════════
     SECTION: PANTHEON
══════════════════════════════ -->
<div id="sec-pantheon" class="section-wrap">
  <p id="pantheon-intro"></p>
  <div id="pantheon-mount"></div>
</div>

<!-- ══════════════════════════════
     SECTION: LANGUAGES
══════════════════════════════ -->
<div id="sec-languages" class="section-wrap">
  <div class="section-label" style="margin-top:0;" id="languages-label"></div>
  <p style="color:var(--muted);font-size:.93rem;margin-bottom:24px;line-height:1.7;" id="languages-intro"></p>
  <div class="lang-grid" id="lang-grid"></div>
</div>

<!-- ══════════════════════════════
     SECTION: LORE & MYSTERIES
══════════════════════════════ -->
<div id="sec-lore" class="section-wrap">
  <div class="section-label" style="margin-top:0;" id="lore-label"></div>
  <p style="color:var(--muted);font-size:.93rem;margin-bottom:24px;line-height:1.7;" id="lore-intro"></p>
  <div id="lore-mount"></div>
</div>

<script src="data/hero.js"></script>
<script src="data/nations.js"></script>
<script src="data/nation-notes.js"></script>
<script src="data/gods.js"></script>
<script src="data/patrons.js"></script>
<script src="data/languages.js"></script>
<script src="data/characters.js"></script>
<script src="data/races.js"></script>
<script src="data/other-races.js"></script>
<script src="data/lore.js"></script>
<script src="app.js"></script>
</body>
</html>
